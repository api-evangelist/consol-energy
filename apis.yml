aid: consol-energy
name: CONSOL Energy
description: >-
  CONSOL Energy was a Pittsburgh-based coal mining company that produced
  high-quality bituminous coal from underground mines for sale to electric
  utilities, steelmakers, and industrial customers. In 2025 CONSOL Energy
  merged with Arch Resources to form Core Natural Resources, and the
  consolenergy.com domain now redirects to corenaturalresources.com. The
  combined company does not publish public developer APIs; its external
  digital surface is organized around an investor relations site, a
  suppliers page (with downloadable terms, conditions, and a Supplier
  Code of Conduct), and corporate sustainability/safety disclosures.

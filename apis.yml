apis:
  - aid: consol-energy:supplier-relations
    name: Core Natural Resources Supplier Relations
    description: >-
      The successor company to CONSOL Energy publishes a suppliers page with
      a downloadable Terms and Conditions document and a Supplier Code of
      Conduct PDF. There is no online supplier portal, online registration,
      or public API; suppliers contact the company directly for onboarding.
    humanURL: https://corenaturalresources.com/suppliers/
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    tags:
      - Procurement
      - Supplier
    properties:
      - type: Documentation
        url: https://corenaturalresources.com/suppliers/
    x-features:
      - Supplier Terms and Conditions
      - Supplier Code of Conduct
    x-use-cases:
      - Review supplier obligations before contracting
      - Download Code of Conduct for compliance review
  - aid: consol-energy:investor-relations
    name: Core Natural Resources Investor Relations
    description: >-
      The investor-facing digital channel for the post-merger Core Natural
      Resources company. It hosts SEC filings, earnings releases, investor
      presentations, and corporate governance documents. Data is published
      as PDFs and HTML rather than as a public investor API.
    humanURL: https://corenaturalresources.com/investors/
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    tags:

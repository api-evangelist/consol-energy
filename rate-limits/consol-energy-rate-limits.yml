specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: CONSOL Energy
providerId: consol-energy
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Coal Mining
  - Energy
  - Rate Limiting
description: CONSOL Energy (now Core Natural Resources) does not publish a public API or any rate-limit
  documentation. Supplier and investor portals inherit limits from their underlying SaaS vendors.
notes: No public CONSOL Energy / Core Natural Resources API exists, so no provider-defined rate limits
  apply.
sources:
  - https://corenaturalresources.com
responseCodes:
  throttled: 429
limits:
  - name: Inherited Vendor-Portal Limits
    scope: vendor-portal
    metric: varies
    limit: 'inherits from underlying SaaS vendor'
    notes: Portal throttling is set by the third-party portal provider, not by CONSOL Energy directly.
policies:
  - name: Vendor-Portal Throttling
    description: Underlying SaaS portal documentation is the source of truth for any rate-limiting behavior.
maintainers:
